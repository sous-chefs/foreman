---
driver:
  name: vagrant
  customize:
    memory: 4096

transport:
  max_wait_until_ready: 600
  connection_retries: 10
  connection_retry_sleep: 10

x-run_lists:
  default: &default_run_list
    - recipe[test::default]
  proxy: &proxy_run_list
    - recipe[test::proxy]

x-attributes:
  default: &default_attributes
    postgresql:
      password:
        postgres: toor
  proxy: &proxy_attributes
    foreman_test:
      proxy:
        register: false
        server_name: foreman.example
        dhcp:
          interface: eth0
          range: 10.0.0.10 10.0.0.20
        dns:
          interface: eth0
        chef_module:
          enabled: false

x-verifiers:
  default: &default_verifier
    inspec_tests:
      - path: test/integration/default
  proxy: &proxy_verifier
    inspec_tests:
      - path: test/integration/proxy

platforms:
  - name: debian-12
  - name: ubuntu-22.04

suites:
  - name: default
    run_list: *default_run_list
    attributes: *default_attributes
    verifier: *default_verifier
  - name: proxy
    run_list: *proxy_run_list
    attributes: *proxy_attributes
    verifier: *proxy_verifier

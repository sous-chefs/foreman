---
driver:
  name: dokken
  privileged: true
  chef_version: <%= ENV.fetch('CHEF_VERSION', 'current') %>

transport:
  name: dokken

provisioner:
  name: dokken

verifier:
  name: inspec

platforms:
  - name: debian-12
    driver:
      image: dokken/debian-12
      platform: linux/amd64
      pid_one_command: /bin/systemd
  - name: ubuntu-22.04
    driver:
      image: dokken/ubuntu-22.04
      platform: linux/amd64
      pid_one_command: /bin/systemd
